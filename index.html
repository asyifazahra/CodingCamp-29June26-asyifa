<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="dashboard-grid">

    <!-- Greeting Widget -->
    <section id="greeting-widget" class="widget" aria-label="Greeting and clock">
      <p id="greeting-message" class="greeting-message"></p>
      <p id="clock-time" class="clock-time"></p>
      <p id="clock-date" class="clock-date"></p>
    </section>

    <!-- Focus Timer -->
    <section id="focus-timer" class="widget" aria-label="Focus timer">
      <h2 class="widget-title">Focus Timer</h2>
      <p id="timer-display" class="timer-display">25:00</p>
      <div class="timer-controls">
        <button id="timer-start" aria-label="Start timer">Start</button>
        <button id="timer-stop" aria-label="Stop timer" disabled>Stop</button>
        <button id="timer-reset" aria-label="Reset timer">Reset</button>
      </div>
      <div id="timer-alert" class="timer-alert" role="alert" aria-live="assertive">
        Session complete! Take a break.
      </div>
    </section>

    <!-- Task Manager -->
    <section id="task-manager" class="widget" aria-label="Task manager">
      <h2 class="widget-title">Tasks</h2>
      <div class="task-add-form">
        <label for="task-input" class="visually-hidden">New task description</label>
        <input
          type="text"
          id="task-input"
          class="task-input"
          placeholder="Add a new task…"
          maxlength="500"
          aria-describedby="task-validation-msg"
        />
        <button id="task-add-btn" aria-label="Add task">Add</button>
      </div>
      <span id="task-validation-msg" class="validation-msg" role="alert" aria-live="polite"></span>
      <ul id="task-list" class="task-list" aria-label="Task list"></ul>
    </section>

    <!-- Quick Links Panel -->
    <section id="quick-links-panel" class="widget" aria-label="Quick links panel">
      <h2 class="widget-title">Quick Links</h2>
      <div class="ql-add-form">
        <label for="ql-label-input">Label</label>
        <input
          type="text"
          id="ql-label-input"
          class="ql-input"
          placeholder="Label"
          maxlength="100"
          aria-describedby="ql-validation-msg"
        />
        <label for="ql-url-input">URL</label>
        <input
          type="url"
          id="ql-url-input"
          class="ql-input"
          placeholder="https://example.com"
          maxlength="2048"
          aria-describedby="ql-validation-msg"
        />
        <button id="ql-add-btn" aria-label="Add quick link">Add Link</button>
      </div>
      <span id="ql-validation-msg" class="validation-msg" role="alert" aria-live="polite"></span>
      <div id="ql-list" class="ql-list" aria-label="Quick links list"></div>
    </section>

  </main>

  <script defer src="js/app.js"></script>
</body>
</html>
