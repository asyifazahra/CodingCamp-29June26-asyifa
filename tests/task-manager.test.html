<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tests — renderTaskList &amp; addTask</title>
  <style>
    body { font-family: monospace; padding: 2rem; background: #0d0d0d; color: #e0e0e0; }
    h1 { color: #7ec8e3; margin-bottom: 0.5rem; }
    .suite { margin-top: 1.5rem; }
    .suite h2 { color: #a8d8a8; font-size: 1rem; margin-bottom: 0.5rem; border-bottom: 1px solid #333; padding-bottom: 0.25rem; }
    .result { padding: 0.5rem 0.75rem; border-radius: 4px; margin: 0.25rem 0; font-size: 0.875rem; }
    .pass { background: #1a3a1a; color: #6dbf6d; border-left: 3px solid #4caf50; }
    .fail { background: #3a1a1a; color: #e07070; border-left: 3px solid #f44336; }
    .info { background: #1a1a2e; color: #8888cc; border-left: 3px solid #555599; }
    #summary { margin-top: 2rem; padding: 1rem; border-radius: 6px; font-size: 1rem; }
    .all-pass { background: #1a3a1a; border: 1px solid #4caf50; color: #88dd88; }
    .has-fail  { background: #3a1a1a; border: 1px solid #f44336; color: #ee8888; }
    pre { white-space: pre-wrap; word-break: break-all; margin: 0.25rem 0 0; font-size: 0.8rem; }
    /* Hidden DOM fixtures used by tests */
    #test-fixtures { display: none; }
  </style>
</head>
<body>
  <h1>Unit &amp; Property Tests — <code>renderTaskList</code> / <code>addTask</code></h1>

  <!-- Minimal DOM fixtures that mirror the real HTML structure -->
  <div id="test-fixtures">
    <ul id="task-list"></ul>
    <input type="text" id="task-input" />
    <button id="task-add-btn">Add</button>
    <span id="task-validation-msg"></span>
  </div>

  <div id="output"></div>
  <div id="summary"></div>

  <script type="module">
    import * as fc from 'https://cdn.jsdelivr.net/npm/fast-check/+esm';

    // ── Inline helpers mirroring app.js internals ────────────────────────────

    const TASKS_KEY = 'dashboard_tasks';

    function storageRead(key) {
      try { return localStorage.getItem(key); } catch (e) { return null; }
    }
    function storageWrite(key, value) {
      try { localStorage.setItem(key, value); return true; } catch (e) { return false; }
    }
    function generateId() {
      if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
        return crypto.randomUUID();
      }
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }
    function loadTasks() {
      var raw = storageRead(TASKS_KEY);
      if (raw === null) return [];
      try {
        var parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) { return []; }
    }
    function saveTasks(tasks) {
      storageWrite(TASKS_KEY, JSON.stringify(tasks));
    }

    // Module-scoped tasks array (mirrors var tasks = [] in IIFE)
    var tasks = [];

    function renderTaskList(tasks) {
      var list = document.getElementById('task-list');
      if (!list) return;
      list.innerHTML = '';
      tasks.forEach(function (task) {
        var li = document.createElement('li');
        li.setAttribute('data-id', task.id);
        li.className = 'task-item' + (task.completed ? ' completed' : '');

        var checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.className = 'task-toggle';
        checkbox.checked = task.completed;
        checkbox.setAttribute('aria-label', 'Mark task complete');

        var span = document.createElement('span');
        span.className = 'task-description';
        span.textContent = task.description;

        var editBtn = document.createElement('button');
        editBtn.className = 'task-edit-btn';
        editBtn.textContent = 'Edit';

        var deleteBtn = document.createElement('button');
        deleteBtn.className = 'task-delete-btn';
        deleteBtn.textContent = 'Delete';

        li.appendChild(checkbox);
        li.appendChild(span);
        li.appendChild(editBtn);
        li.appendChild(deleteBtn);
        list.appendChild(li);
      });
    }

    function addTask(description) {
      var trimmed = description.trim();
      var validationMsg = document.getElementById('task-validation-msg');
      if (trimmed.length === 0) {
        if (validationMsg) validationMsg.textContent = 'Task description cannot be empty.';
        return;
      }
      if (validationMsg) validationMsg.textContent = '';
      var newTask = { id: generateId(), description: trimmed, completed: false };
      tasks.push(newTask);
      saveTasks(tasks);
      renderTaskList(tasks);
      var taskInput = document.getElementById('task-input');
      if (taskInput) { taskInput.value = ''; taskInput.focus(); }
    }

    // ── Test harness ─────────────────────────────────────────────────────────
    const output  = document.getElementById('output');
    const summary = document.getElementById('summary');
    let passed = 0, failed = 0;

    function log(html) {
      const div = document.createElement('div');
      div.innerHTML = html;
      output.appendChild(div);
    }
    function section(title) {
      log(`<div class="suite"><h2>${title}</h2></div>`);
    }
    function reportPass(label) { passed++; log(`<div class="result pass">✓ ${label}</div>`); }
    function reportFail(label, detail) { failed++; log(`<div class="result fail">✗ ${label}<pre>${detail}</pre></div>`); }
    function assert(condition, label, detail) {
      condition ? reportPass(label) : reportFail(label, detail || 'assertion failed');
    }
    async function runProperty(label, prop, options = {}) {
      try {
        await fc.assert(prop, { numRuns: 100, ...options });
        reportPass(label);
      } catch (err) {
        reportFail(label, String(err));
      }
    }
    function resetState() {
      tasks = [];
      localStorage.removeItem(TASKS_KEY);
      document.getElementById('task-list').innerHTML = '';
      document.getElementById('task-input').value = '';
      document.getElementById('task-validation-msg').textContent = '';
    }

    // ── Unit tests: renderTaskList ───────────────────────────────────────────
    section('Unit tests — renderTaskList');

    // 1. Empty array renders empty list
    resetState();
    renderTaskList([]);
    assert(
      document.getElementById('task-list').children.length === 0,
      'renderTaskList([]) produces an empty <ul>'
    );

    // 2. One task renders one <li>
    resetState();
    renderTaskList([{ id: 'a1', description: 'Buy milk', completed: false }]);
    var listEl = document.getElementById('task-list');
    assert(listEl.children.length === 1, 'renderTaskList with 1 task produces 1 <li>');

    // 3. data-id attribute is set correctly
    assert(
      listEl.children[0].getAttribute('data-id') === 'a1',
      '<li> has correct data-id attribute'
    );

    // 4. Incomplete task does not have "completed" class
    assert(
      !listEl.children[0].classList.contains('completed'),
      'Incomplete task <li> does not have class "completed"'
    );

    // 5. Checkbox is unchecked for incomplete task
    assert(
      listEl.children[0].querySelector('.task-toggle').checked === false,
      'Checkbox is unchecked for incomplete task'
    );

    // 6. Completed task gets "completed" class and checked checkbox
    resetState();
    renderTaskList([{ id: 'b2', description: 'Exercise', completed: true }]);
    var completedLi = document.getElementById('task-list').children[0];
    assert(
      completedLi.classList.contains('completed'),
      'Completed task <li> has class "completed"'
    );
    assert(
      completedLi.querySelector('.task-toggle').checked === true,
      'Checkbox is checked for completed task'
    );

    // 7. Task description text is correct
    assert(
      completedLi.querySelector('.task-description').textContent === 'Exercise',
      '<span class="task-description"> shows the correct description'
    );

    // 8. Edit and Delete buttons are present
    assert(
      completedLi.querySelector('.task-edit-btn') !== null,
      'Edit button (.task-edit-btn) is present in <li>'
    );
    assert(
      completedLi.querySelector('.task-delete-btn') !== null,
      'Delete button (.task-delete-btn) is present in <li>'
    );

    // 9. Multiple tasks render in correct order
    resetState();
    const multiTasks = [
      { id: '1', description: 'First',  completed: false },
      { id: '2', description: 'Second', completed: true  },
      { id: '3', description: 'Third',  completed: false },
    ];
    renderTaskList(multiTasks);
    var items = document.getElementById('task-list').children;
    assert(
      items.length === 3 &&
      items[0].querySelector('.task-description').textContent === 'First' &&
      items[1].querySelector('.task-description').textContent === 'Second' &&
      items[2].querySelector('.task-description').textContent === 'Third',
      'renderTaskList preserves task order in the DOM'
    );

    // 10. Re-rendering clears previous items (no duplicates)
    renderTaskList(multiTasks);
    assert(
      document.getElementById('task-list').children.length === 3,
      'Calling renderTaskList twice does not duplicate items'
    );

    // ── Unit tests: addTask ──────────────────────────────────────────────────
    section('Unit tests — addTask');

    // 11. Empty string shows validation message and does not add task
    resetState();
    addTask('');
    assert(
      tasks.length === 0,
      'addTask("") does not add a task'
    );
    assert(
      document.getElementById('task-validation-msg').textContent.length > 0,
      'addTask("") displays a validation message'
    );

    // 12. Whitespace-only string is rejected
    resetState();
    addTask('   ');
    assert(
      tasks.length === 0,
      'addTask("   ") (whitespace only) does not add a task'
    );

    // 13. Valid description adds task to array
    resetState();
    addTask('Write tests');
    assert(
      tasks.length === 1 && tasks[0].description === 'Write tests',
      'addTask("Write tests") adds one task with correct description'
    );

    // 14. New task has completed=false
    assert(
      tasks[0].completed === false,
      'Newly added task has completed = false'
    );

    // 15. Input field is cleared after successful add
    document.getElementById('task-input').value = 'something';
    addTask('Another task');
    assert(
      document.getElementById('task-input').value === '',
      '#task-input is cleared after successful addTask'
    );

    // 16. Validation message is cleared after successful add
    document.getElementById('task-validation-msg').textContent = 'old error';
    addTask('Clear the error');
    assert(
      document.getElementById('task-validation-msg').textContent === '',
      'Validation message is cleared after a successful addTask'
    );

    // 17. Task is persisted to localStorage
    resetState();
    addTask('Persist me');
    var stored = loadTasks();
    assert(
      stored.length === 1 && stored[0].description === 'Persist me',
      'addTask persists the task to localStorage'
    );

    // 18. Description is trimmed before storing
    resetState();
    addTask('  trimmed  ');
    assert(
      tasks[0].description === 'trimmed',
      'addTask trims leading/trailing whitespace from the description'
    );

    // 19. Each task gets a unique id
    resetState();
    addTask('Task A');
    addTask('Task B');
    assert(
      tasks[0].id !== tasks[1].id,
      'Each task added by addTask gets a unique id'
    );

    // 20. renderTaskList is called after addTask (DOM reflects new task)
    resetState();
    addTask('DOM task');
    assert(
      document.getElementById('task-list').children.length === 1 &&
      document.getElementById('task-list').children[0].querySelector('.task-description').textContent === 'DOM task',
      'addTask calls renderTaskList — new task appears in the DOM'
    );

    // ── Property tests ───────────────────────────────────────────────────────
    section('Property 5 — Valid task descriptions grow the list');
    // Validates: Requirements 3.1, 3.2

    const validDescArb = fc.string({ minLength: 1, maxLength: 500 })
      .map(s => s.trim()).filter(s => s.length >= 1);

    await runProperty(
      'addTask with any valid (non-empty) description increases tasks.length by exactly 1',
      fc.property(validDescArb, (desc) => {
        resetState();
        addTask(desc);
        return tasks.length === 1;
      })
    );

    await runProperty(
      'New task always has completed = false regardless of description',
      fc.property(validDescArb, (desc) => {
        resetState();
        addTask(desc);
        return tasks[0].completed === false;
      })
    );

    await runProperty(
      'New task description equals trimmed input',
      fc.property(validDescArb, (desc) => {
        resetState();
        addTask(desc);
        return tasks[0].description === desc.trim();
      })
    );

    section('Property 6 — Whitespace-only/empty descriptions are rejected');
    // Validates: Requirements 3.3, 3.4

    const whitespaceArb = fc.stringMatching(/^\s*$/);

    await runProperty(
      'addTask with whitespace-only input never adds a task',
      fc.property(whitespaceArb, (desc) => {
        resetState();
        addTask(desc);
        return tasks.length === 0;
      })
    );

    await runProperty(
      'addTask with whitespace-only input leaves localStorage unchanged',
      fc.property(whitespaceArb, (desc) => {
        resetState();
        addTask(desc);
        return loadTasks().length === 0;
      })
    );

    await runProperty(
      'addTask with whitespace-only input sets a non-empty validation message',
      fc.property(whitespaceArb, (desc) => {
        resetState();
        addTask(desc);
        return document.getElementById('task-validation-msg').textContent.length > 0;
      })
    );

    // ── Summary ──────────────────────────────────────────────────────────────
    resetState();
    const total = passed + failed;
    const cls   = failed === 0 ? 'all-pass' : 'has-fail';
    const icon  = failed === 0 ? '✓' : '✗';
    summary.innerHTML = `
      <div id="summary" class="${cls}">
        ${icon} ${passed} / ${total} tests passed
        ${failed > 0 ? `<br><strong>${failed} test(s) failed — see details above.</strong>` : ''}
      </div>`;

    console.log(`[PBT] ${passed}/${total} passed, ${failed} failed`);
  </script>
</body>
</html>
