<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tests — loadTasks &amp; saveTasks</title>
  <style>
    body { font-family: monospace; padding: 2rem; background: #0d0d0d; color: #e0e0e0; }
    h1 { color: #7ec8e3; margin-bottom: 0.5rem; }
    .suite { margin-top: 1.5rem; }
    .suite h2 { color: #a8d8a8; font-size: 1rem; margin-bottom: 0.5rem; border-bottom: 1px solid #333; padding-bottom: 0.25rem; }
    .result { padding: 0.5rem 0.75rem; border-radius: 4px; margin: 0.25rem 0; font-size: 0.875rem; }
    .pass { background: #1a3a1a; color: #6dbf6d; border-left: 3px solid #4caf50; }
    .fail { background: #3a1a1a; color: #e07070; border-left: 3px solid #f44336; }
    .info { background: #1a1a2e; color: #8888cc; border-left: 3px solid #555599; }
    #summary { margin-top: 2rem; padding: 1rem; border-radius: 6px; font-size: 1rem; }
    .all-pass { background: #1a3a1a; border: 1px solid #4caf50; color: #88dd88; }
    .has-fail  { background: #3a1a1a; border: 1px solid #f44336; color: #ee8888; }
    pre { white-space: pre-wrap; word-break: break-all; margin: 0.25rem 0 0; font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>Unit &amp; Property Tests — <code>loadTasks</code> / <code>saveTasks</code></h1>
  <p class="info result">Loading fast-check from CDN&hellip;</p>

  <div id="output"></div>
  <div id="summary"></div>

  <script type="module">
    // ── Import fast-check from CDN ───────────────────────────────────────────
    import * as fc from 'https://cdn.jsdelivr.net/npm/fast-check/+esm';

    // ── Inline copies of the functions under test ────────────────────────────
    // These mirror the implementations in js/app.js exactly.

    const TASKS_KEY = 'dashboard_tasks';

    // Thin storage wrappers (same as app.js)
    function storageRead(key) {
      try {
        return localStorage.getItem(key);
      } catch (e) {
        return null;
      }
    }

    function storageWrite(key, value) {
      try {
        localStorage.setItem(key, value);
        return true;
      } catch (e) {
        return false;
      }
    }

    function generateId() {
      if (typeof crypto !== 'undefined' && typeof crypto.randomUUID === 'function') {
        return crypto.randomUUID();
      }
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    function loadTasks() {
      var raw = storageRead(TASKS_KEY);
      if (raw === null) {
        return [];
      }
      try {
        var parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        console.error('dashboard: failed to parse tasks from localStorage', e);
        return [];
      }
    }

    // saveTasks needs a DOM element for error display; in these tests we pass a
    // mock element or null — the storage itself is what we verify.
    function saveTasks(tasks) {
      var ok = storageWrite(TASKS_KEY, JSON.stringify(tasks));
      if (!ok) {
        // In tests the DOM element won't exist; that's fine — we just check
        // that the function handles it gracefully without throwing.
        var msg = document.getElementById('task-validation-msg');
        if (msg) {
          msg.textContent = 'Error: could not save tasks.';
        }
      }
    }

    // Helper: make a task object
    function makeTask(id, description, completed) {
      return { id: id, description: description, completed: completed };
    }

    // ── Test harness helpers ─────────────────────────────────────────────────
    const output  = document.getElementById('output');
    const summary = document.getElementById('summary');
    let passed = 0;
    let failed = 0;

    function log(html) {
      const div = document.createElement('div');
      div.innerHTML = html;
      output.appendChild(div);
    }

    function section(title) {
      log(`<div class="suite"><h2>${title}</h2></div>`);
    }

    function reportPass(label) {
      passed++;
      log(`<div class="result pass">✓ ${label}</div>`);
    }

    function reportFail(label, detail) {
      failed++;
      log(`<div class="result fail">✗ ${label}<pre>${detail}</pre></div>`);
    }

    function assert(condition, label, detail) {
      if (condition) {
        reportPass(label);
      } else {
        reportFail(label, detail || 'assertion failed');
      }
    }

    async function runProperty(label, prop, options = {}) {
      try {
        await fc.assert(prop, { numRuns: 100, ...options });
        reportPass(label);
      } catch (err) {
        reportFail(label, String(err));
      }
    }

    // Clean up before each logical group
    function clearStorage() {
      localStorage.removeItem(TASKS_KEY);
    }

    // ── Unit Tests ───────────────────────────────────────────────────────────
    section('Unit tests — loadTasks edge cases');

    // 1. Missing key → []
    clearStorage();
    assert(
      JSON.stringify(loadTasks()) === '[]',
      'loadTasks returns [] when key is absent'
    );

    // 2. Corrupt JSON → []
    clearStorage();
    localStorage.setItem(TASKS_KEY, '{not valid json}');
    assert(
      JSON.stringify(loadTasks()) === '[]',
      'loadTasks returns [] on corrupt JSON'
    );

    // 3. Non-array JSON (e.g. an object) → []
    clearStorage();
    localStorage.setItem(TASKS_KEY, '{"id":"x"}');
    assert(
      JSON.stringify(loadTasks()) === '[]',
      'loadTasks returns [] when stored value is a non-array'
    );

    // 4. Empty array → []
    clearStorage();
    localStorage.setItem(TASKS_KEY, '[]');
    const emptyResult = loadTasks();
    assert(
      Array.isArray(emptyResult) && emptyResult.length === 0,
      'loadTasks returns [] when stored array is empty'
    );

    // 5. Single task round-trip
    clearStorage();
    const singleTask = [makeTask('abc-123', 'Buy milk', false)];
    saveTasks(singleTask);
    const loaded = loadTasks();
    assert(
      loaded.length === 1 &&
      loaded[0].id          === 'abc-123' &&
      loaded[0].description === 'Buy milk' &&
      loaded[0].completed   === false,
      'saveTasks + loadTasks round-trips a single task correctly'
    );

    // 6. Completed flag is preserved
    clearStorage();
    const completedTask = [makeTask('xyz-999', 'Exercise', true)];
    saveTasks(completedTask);
    const loadedCompleted = loadTasks();
    assert(
      loadedCompleted[0].completed === true,
      'saveTasks persists completed=true; loadTasks restores it'
    );

    // 7. Multiple tasks preserve order
    clearStorage();
    const tasks3 = [
      makeTask('1', 'First',  false),
      makeTask('2', 'Second', true),
      makeTask('3', 'Third',  false),
    ];
    saveTasks(tasks3);
    const loaded3 = loadTasks();
    const orderOk =
      loaded3[0].description === 'First' &&
      loaded3[1].description === 'Second' &&
      loaded3[2].description === 'Third';
    assert(orderOk, 'loadTasks preserves task order after saveTasks');

    // 8. saveTasks does not throw when #task-validation-msg is absent from DOM
    clearStorage();
    let noThrow = true;
    try {
      saveTasks([makeTask('id1', 'Test', false)]);
    } catch (e) {
      noThrow = false;
    }
    assert(noThrow, 'saveTasks does not throw when #task-validation-msg is missing from DOM');

    // 9. loadTasks does not throw when localStorage is empty
    clearStorage();
    let loadNoThrow = true;
    try {
      loadTasks();
    } catch (e) {
      loadNoThrow = false;
    }
    assert(loadNoThrow, 'loadTasks does not throw on empty localStorage');

    // ── Property-Based Tests ─────────────────────────────────────────────────
    section('Property 7 — Task persistence round-trip');
    // Feature: todo-list-life-dashboard, Property 7: Task persistence round-trip
    // Validates: Requirements 3.5, 3.6, 5.4, 5.5, 8.2, 8.3

    // Arbitraries
    const idArb = fc.string({ minLength: 1, maxLength: 36 });

    // description: trimmed length 1–500 (no leading/trailing whitespace so round-trip is exact)
    const descriptionArb = fc.string({ minLength: 1, maxLength: 500 }).map(s => s.trim()).filter(s => s.length >= 1);

    const completedArb = fc.boolean();

    const taskArb = fc.record({
      id:          idArb,
      description: descriptionArb,
      completed:   completedArb,
    });

    const tasksArrayArb = fc.array(taskArb, { minLength: 0, maxLength: 20 });

    await runProperty(
      'saveTasks then loadTasks returns a deeply equal array (same length, order, and field values)',
      fc.property(
        tasksArrayArb,
        (tasks) => {
          clearStorage();
          saveTasks(tasks);
          const result = loadTasks();

          if (result.length !== tasks.length) return false;

          for (let i = 0; i < tasks.length; i++) {
            if (result[i].id          !== tasks[i].id)          return false;
            if (result[i].description !== tasks[i].description) return false;
            if (result[i].completed   !== tasks[i].completed)   return false;
          }
          return true;
        }
      )
    );

    await runProperty(
      'loadTasks always returns an array (never null or undefined)',
      fc.property(
        tasksArrayArb,
        (tasks) => {
          clearStorage();
          saveTasks(tasks);
          const result = loadTasks();
          return Array.isArray(result);
        }
      )
    );

    await runProperty(
      'loadTasks on empty storage always returns [] (not null/undefined)',
      fc.property(
        fc.constant(null),  // dummy input — we just need to run multiple times
        () => {
          clearStorage();
          const result = loadTasks();
          return Array.isArray(result) && result.length === 0;
        }
      )
    );

    await runProperty(
      'Overwriting tasks with saveTasks always reflects the latest data on loadTasks',
      fc.property(
        tasksArrayArb,
        tasksArrayArb,
        (first, second) => {
          clearStorage();
          saveTasks(first);
          saveTasks(second);  // overwrite
          const result = loadTasks();

          if (result.length !== second.length) return false;
          for (let i = 0; i < second.length; i++) {
            if (result[i].id          !== second[i].id)          return false;
            if (result[i].description !== second[i].description) return false;
            if (result[i].completed   !== second[i].completed)   return false;
          }
          return true;
        }
      )
    );

    await runProperty(
      'No task has its completed flag coerced — boolean identity preserved',
      fc.property(
        tasksArrayArb,
        (tasks) => {
          clearStorage();
          saveTasks(tasks);
          const result = loadTasks();
          return result.every((t, i) => t.completed === tasks[i].completed);
        }
      )
    );

    // ── Summary ──────────────────────────────────────────────────────────────
    clearStorage();  // leave no test artifacts in localStorage

    const total = passed + failed;
    const cls   = failed === 0 ? 'all-pass' : 'has-fail';
    const icon  = failed === 0 ? '✓' : '✗';
    summary.innerHTML = `
      <div id="summary" class="${cls}">
        ${icon} ${passed} / ${total} tests passed
        ${failed > 0 ? `<br><strong>${failed} test(s) failed — see details above.</strong>` : ''}
      </div>`;

    console.log(`[PBT] ${passed}/${total} passed, ${failed} failed`);
    if (failed > 0) {
      console.error('[PBT] Some property tests FAILED — see output above.');
    }
  </script>
</body>
</html>
