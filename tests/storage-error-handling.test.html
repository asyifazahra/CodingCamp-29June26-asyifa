<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tests — Storage Error Handling (Task 14.1)</title>
  <style>
    body { font-family: monospace; padding: 2rem; background: #0d0d0d; color: #e0e0e0; }
    h1 { color: #7ec8e3; margin-bottom: 0.5rem; }
    .suite { margin-top: 1.5rem; }
    .suite h2 { color: #a8d8a8; font-size: 1rem; margin-bottom: 0.5rem; border-bottom: 1px solid #333; padding-bottom: 0.25rem; }
    .result { padding: 0.5rem 0.75rem; border-radius: 4px; margin: 0.25rem 0; font-size: 0.875rem; }
    .pass { background: #1a3a1a; color: #6dbf6d; border-left: 3px solid #4caf50; }
    .fail { background: #3a1a1a; color: #e07070; border-left: 3px solid #f44336; }
    .info { background: #1a1a2e; color: #8888cc; border-left: 3px solid #555599; }
    #summary { margin-top: 2rem; padding: 1rem; border-radius: 6px; font-size: 1rem; }
    .all-pass { background: #1a3a1a; border: 1px solid #4caf50; color: #88dd88; }
    .has-fail  { background: #3a1a1a; border: 1px solid #f44336; color: #ee8888; }
    pre { white-space: pre-wrap; word-break: break-all; margin: 0.25rem 0 0; font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>Unit Tests — Storage Error Handling (Requirements 8.4, 8.5)</h1>
  <p class="result info">Tests run inline — no server required.</p>

  <!--
    Minimal DOM that mirrors the widgets in index.html.
    initTaskManager and initQuickLinksPanel look for these elements.
  -->
  <div id="storage-warning" style="display:none;" role="alert"></div>
  <ul id="task-list"></ul>
  <div id="ql-list"></div>
  <!-- stub inputs / buttons so init functions don't throw on missing elements -->
  <input id="task-input" type="text" />
  <button id="task-add-btn"></button>
  <span id="task-validation-msg"></span>
  <input id="ql-label-input" type="text" />
  <input id="ql-url-input" type="text" />
  <button id="ql-add-btn"></button>
  <span id="ql-validation-msg"></span>

  <div id="output"></div>
  <div id="summary"></div>

  <script>
    // ── Inline copies of functions from app.js (same logic, no IIFE wrapper) ──

    function storageRead(key) {
      try {
        return localStorage.getItem(key);
      } catch (e) {
        return null;
      }
    }

    function storageWrite(key, value) {
      try {
        localStorage.setItem(key, value);
        return true;
      } catch (e) {
        return false;
      }
    }

    function showStorageWarning() {
      var banner = document.getElementById('storage-warning');
      if (banner) {
        banner.style.display = '';
      }
    }

    function loadTasks() {
      var raw = storageRead('dashboard_tasks');
      if (raw === null) return [];
      try {
        var parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        console.error('dashboard: failed to parse tasks from localStorage', e);
        return [];
      }
    }

    function loadLinks() {
      var raw = storageRead('dashboard_quicklinks');
      if (raw === null) return [];
      try {
        var parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        console.error('loadLinks: failed to parse stored quick links', e);
        return [];
      }
    }

    function renderTaskList(tasksArray) {
      var list = document.getElementById('task-list');
      if (!list) return;
      list.innerHTML = '';
      tasksArray.forEach(function (task) {
        var li = document.createElement('li');
        li.setAttribute('data-id', task.id);
        list.appendChild(li);
      });
    }

    function renderLinks(linksArray) {
      var list = document.getElementById('ql-list');
      if (!list) return;
      list.innerHTML = '';
      linksArray.forEach(function (link) {
        var item = document.createElement('div');
        item.className = 'ql-item';
        list.appendChild(item);
      });
    }

    /**
     * Simulates the storage-error detection logic from initTaskManager /
     * initQuickLinksPanel (extracted so we can test it in isolation).
     *
     * @param {string} key  - localStorage key to inspect
     * @returns {boolean}   - true if the warning banner should be shown
     */
    function shouldShowWarning(key) {
      var raw = storageRead(key);
      if (raw === null) {
        // Could be missing key (first run) or storage blocked.
        // Try a direct access to distinguish the SecurityError case.
        try {
          localStorage.getItem(key);
        } catch (e) {
          return true; // storage unavailable
        }
        return false; // key simply absent — normal first run
      }
      // Raw value present — try to parse it.
      try {
        JSON.parse(raw);
        return false;
      } catch (e) {
        return true; // corrupt JSON
      }
    }

    // ── Test harness ──────────────────────────────────────────────────────────
    const output  = document.getElementById('output');
    const summary = document.getElementById('summary');
    let passed = 0;
    let failed = 0;

    function log(html) {
      var div = document.createElement('div');
      div.innerHTML = html;
      output.appendChild(div);
    }

    function section(title) {
      log('<div class="suite"><h2>' + title + '</h2></div>');
    }

    function reportPass(label) {
      passed++;
      log('<div class="result pass">✓ ' + label + '</div>');
    }

    function reportFail(label, detail) {
      failed++;
      log('<div class="result fail">✗ ' + label + '<pre>' + (detail || 'assertion failed') + '</pre></div>');
    }

    function assert(condition, label, detail) {
      if (condition) {
        reportPass(label);
      } else {
        reportFail(label, detail || 'Expected condition to be true');
      }
    }

    function resetBanner() {
      var banner = document.getElementById('storage-warning');
      if (banner) banner.style.display = 'none';
    }

    function clearTestKeys() {
      localStorage.removeItem('dashboard_tasks');
      localStorage.removeItem('dashboard_quicklinks');
    }

    // ── Requirement 8.4: storageRead null → render empty state ───────────────
    section('Requirement 8.4 — Storage unavailable: render empty state');

    // When storageRead returns null (key absent = normal first run):
    clearTestKeys();
    resetBanner();
    var t = loadTasks();
    renderTaskList(t);
    assert(
      Array.isArray(t) && t.length === 0,
      'loadTasks returns [] when dashboard_tasks key is absent'
    );
    assert(
      document.querySelectorAll('#task-list li').length === 0,
      'Task_Manager renders zero <li> elements when tasks key is absent'
    );

    clearTestKeys();
    var l = loadLinks();
    renderLinks(l);
    assert(
      Array.isArray(l) && l.length === 0,
      'loadLinks returns [] when dashboard_quicklinks key is absent'
    );
    assert(
      document.querySelectorAll('#ql-list .ql-item').length === 0,
      'Quick_Links_Panel renders zero .ql-item elements when links key is absent'
    );

    // ── Requirement 8.5: corrupt JSON → render empty state + banner ──────────
    section('Requirement 8.5 — Corrupt JSON: render empty state and show warning banner');

    // Tasks corrupt JSON
    clearTestKeys();
    resetBanner();
    localStorage.setItem('dashboard_tasks', '{not valid json}');
    var shouldWarnTasks = shouldShowWarning('dashboard_tasks');
    assert(
      shouldWarnTasks === true,
      'shouldShowWarning returns true for corrupt tasks JSON'
    );

    var tasksFromCorrupt = loadTasks();
    renderTaskList(tasksFromCorrupt);
    assert(
      Array.isArray(tasksFromCorrupt) && tasksFromCorrupt.length === 0,
      'loadTasks returns [] when tasks JSON is corrupt'
    );
    assert(
      document.querySelectorAll('#task-list li').length === 0,
      'Task_Manager renders zero <li> elements when tasks JSON is corrupt'
    );

    // Simulate banner being shown for corrupt tasks
    if (shouldWarnTasks) showStorageWarning();
    var banner = document.getElementById('storage-warning');
    assert(
      banner && banner.style.display !== 'none',
      'Warning banner is visible after corrupt tasks JSON is detected'
    );

    // Quick links corrupt JSON
    clearTestKeys();
    resetBanner();
    localStorage.setItem('dashboard_quicklinks', '[[broken');
    var shouldWarnLinks = shouldShowWarning('dashboard_quicklinks');
    assert(
      shouldWarnLinks === true,
      'shouldShowWarning returns true for corrupt quick links JSON'
    );

    var linksFromCorrupt = loadLinks();
    renderLinks(linksFromCorrupt);
    assert(
      Array.isArray(linksFromCorrupt) && linksFromCorrupt.length === 0,
      'loadLinks returns [] when quick links JSON is corrupt'
    );
    assert(
      document.querySelectorAll('#ql-list .ql-item').length === 0,
      'Quick_Links_Panel renders zero .ql-item elements when links JSON is corrupt'
    );

    if (shouldWarnLinks) showStorageWarning();
    var bannerAfterLinks = document.getElementById('storage-warning');
    assert(
      bannerAfterLinks && bannerAfterLinks.style.display !== 'none',
      'Warning banner is visible after corrupt quick links JSON is detected'
    );

    // ── Normal data: no banner, correct render ────────────────────────────────
    section('Normal data — no warning banner, correct render');

    clearTestKeys();
    resetBanner();
    localStorage.setItem('dashboard_tasks', JSON.stringify([
      { id: '1', description: 'Test task', completed: false }
    ]));
    var shouldWarnNormal = shouldShowWarning('dashboard_tasks');
    assert(
      shouldWarnNormal === false,
      'shouldShowWarning returns false for valid tasks JSON'
    );
    assert(
      document.getElementById('storage-warning').style.display === 'none',
      'Warning banner stays hidden when tasks JSON is valid'
    );

    clearTestKeys();
    resetBanner();
    localStorage.setItem('dashboard_quicklinks', JSON.stringify([
      { id: '1', label: 'Google', url: 'https://google.com' }
    ]));
    var shouldWarnNormalLinks = shouldShowWarning('dashboard_quicklinks');
    assert(
      shouldWarnNormalLinks === false,
      'shouldShowWarning returns false for valid quick links JSON'
    );
    assert(
      document.getElementById('storage-warning').style.display === 'none',
      'Warning banner stays hidden when quick links JSON is valid'
    );

    // ── Empty arrays: valid JSON, no banner ───────────────────────────────────
    section('Edge case — empty arrays stored in localStorage');

    clearTestKeys();
    resetBanner();
    localStorage.setItem('dashboard_tasks', '[]');
    localStorage.setItem('dashboard_quicklinks', '[]');
    assert(
      shouldShowWarning('dashboard_tasks') === false,
      'shouldShowWarning returns false for stored empty array (tasks)'
    );
    assert(
      shouldShowWarning('dashboard_quicklinks') === false,
      'shouldShowWarning returns false for stored empty array (links)'
    );

    var emptyTasks = loadTasks();
    renderTaskList(emptyTasks);
    assert(
      emptyTasks.length === 0 && document.querySelectorAll('#task-list li').length === 0,
      'Task_Manager empty state: zero <li> elements for stored empty array'
    );

    var emptyLinks = loadLinks();
    renderLinks(emptyLinks);
    assert(
      emptyLinks.length === 0 && document.querySelectorAll('#ql-list .ql-item').length === 0,
      'Quick_Links_Panel empty state: zero .ql-item elements for stored empty array'
    );

    // ── Warning banner is a DOM element, not an alert() ───────────────────────
    section('Warning banner is a DOM element (not alert())');

    assert(
      document.getElementById('storage-warning') !== null,
      '#storage-warning element exists in the DOM'
    );
    assert(
      document.getElementById('storage-warning').getAttribute('role') === 'alert',
      '#storage-warning has role="alert" for accessibility'
    );

    // ── Cleanup ───────────────────────────────────────────────────────────────
    clearTestKeys();

    // ── Summary ───────────────────────────────────────────────────────────────
    var total = passed + failed;
    var cls  = failed === 0 ? 'all-pass' : 'has-fail';
    var icon = failed === 0 ? '✓' : '✗';
    summary.innerHTML =
      '<div class="' + cls + '">' +
        icon + ' ' + passed + ' / ' + total + ' tests passed' +
        (failed > 0 ? '<br><strong>' + failed + ' test(s) failed — see details above.</strong>' : '') +
      '</div>';

    console.log('[Tests] ' + passed + '/' + total + ' passed, ' + failed + ' failed');
    if (failed > 0) {
      console.error('[Tests] Some tests FAILED — see output above.');
    }
  </script>
</body>
</html>
