<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PBT — Greeting &amp; Clock Properties</title>
  <style>
    body { font-family: monospace; padding: 2rem; background: #0d0d0d; color: #e0e0e0; }
    h1 { color: #7ec8e3; margin-bottom: 0.5rem; }
    .suite { margin-top: 1.5rem; }
    .suite h2 { color: #a8d8a8; font-size: 1rem; margin-bottom: 0.5rem; border-bottom: 1px solid #333; padding-bottom: 0.25rem; }
    .result { padding: 0.5rem 0.75rem; border-radius: 4px; margin: 0.25rem 0; font-size: 0.875rem; }
    .pass { background: #1a3a1a; color: #6dbf6d; border-left: 3px solid #4caf50; }
    .fail { background: #3a1a1a; color: #e07070; border-left: 3px solid #f44336; }
    .info { background: #1a1a2e; color: #8888cc; border-left: 3px solid #555599; }
    #summary { margin-top: 2rem; padding: 1rem; border-radius: 6px; font-size: 1rem; }
    .all-pass { background: #1a3a1a; border: 1px solid #4caf50; color: #88dd88; }
    .has-fail  { background: #3a1a1a; border: 1px solid #f44336; color: #ee8888; }
    pre { white-space: pre-wrap; word-break: break-all; margin: 0.25rem 0 0; font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>Property-Based Tests — Greeting &amp; Clock</h1>
  <p class="info result">Loading fast-check from CDN&hellip;</p>

  <div id="output"></div>
  <div id="summary"></div>

  <script type="module">
    // ── Import fast-check from CDN ───────────────────────────────────────────
    import * as fc from 'https://cdn.jsdelivr.net/npm/fast-check/+esm';

    // ── Inline copies of the functions under test ────────────────────────────
    // These mirror the implementations in js/app.js exactly so the tests run
    // in a module <script> without needing to import the IIFE-wrapped app file.

    function formatTime(date) {
      var hh = String(date.getHours()).padStart(2, '0');
      var mm = String(date.getMinutes()).padStart(2, '0');
      var ss = String(date.getSeconds()).padStart(2, '0');
      return hh + ':' + mm + ':' + ss;
    }

    function getGreeting(hour) {
      if (hour >= 5 && hour <= 11) {
        return 'Good Morning';
      } else if (hour >= 12 && hour <= 17) {
        return 'Good Afternoon';
      } else if (hour >= 18 && hour <= 20) {
        return 'Good Evening';
      } else {
        return 'Good Night';
      }
    }

    // ── Test harness helpers ─────────────────────────────────────────────────
    const output  = document.getElementById('output');
    const summary = document.getElementById('summary');
    let passed = 0;
    let failed = 0;

    function log(html) {
      const div = document.createElement('div');
      div.innerHTML = html;
      output.appendChild(div);
    }

    function section(title) {
      log(`<div class="suite"><h2>${title}</h2></div>`);
    }

    function reportPass(label) {
      passed++;
      log(`<div class="result pass">✓ ${label}</div>`);
    }

    function reportFail(label, detail) {
      failed++;
      log(`<div class="result fail">✗ ${label}<pre>${detail}</pre></div>`);
    }

    async function runProperty(label, prop, options = {}) {
      try {
        await fc.assert(prop, { numRuns: 100, ...options });
        reportPass(label);
      } catch (err) {
        reportFail(label, String(err));
      }
    }

    // ── Unit tests (boundary examples) ──────────────────────────────────────
    section('Unit tests — boundary examples');

    // getGreeting boundaries
    const greetingCases = [
      [0,  'Good Night'],
      [4,  'Good Night'],
      [5,  'Good Morning'],
      [11, 'Good Morning'],
      [12, 'Good Afternoon'],
      [17, 'Good Afternoon'],
      [18, 'Good Evening'],
      [20, 'Good Evening'],
      [21, 'Good Night'],
      [23, 'Good Night'],
    ];
    for (const [hour, expected] of greetingCases) {
      const actual = getGreeting(hour);
      if (actual === expected) {
        reportPass(`getGreeting(${hour}) === "${expected}"`);
      } else {
        reportFail(`getGreeting(${hour})`, `Expected "${expected}", got "${actual}"`);
      }
    }

    // formatTime zero-padding
    const padDate = new Date(2025, 0, 1, 9, 5, 3);  // 09:05:03
    const padResult = formatTime(padDate);
    if (padResult === '09:05:03') {
      reportPass(`formatTime pads single digits correctly → "${padResult}"`);
    } else {
      reportFail('formatTime single-digit padding', `Expected "09:05:03", got "${padResult}"`);
    }

    // formatTime midnight
    const midnightDate = new Date(2025, 0, 1, 0, 0, 0);
    const midnightResult = formatTime(midnightDate);
    if (midnightResult === '00:00:00') {
      reportPass(`formatTime midnight → "${midnightResult}"`);
    } else {
      reportFail('formatTime midnight', `Expected "00:00:00", got "${midnightResult}"`);
    }

    // formatTime 23:59:59
    const lateDate = new Date(2025, 0, 1, 23, 59, 59);
    const lateResult = formatTime(lateDate);
    if (lateResult === '23:59:59') {
      reportPass(`formatTime end of day → "${lateResult}"`);
    } else {
      reportFail('formatTime end of day', `Expected "23:59:59", got "${lateResult}"`);
    }

    // ── Property-based tests ─────────────────────────────────────────────────
    section('Property 1 — Greeting bucket is exhaustive and mutually exclusive');
    // Feature: todo-list-life-dashboard, Property 1: Greeting bucket is exhaustive and mutually exclusive
    // Validates: Requirements 1.3, 1.4, 1.5, 1.6

    const VALID_GREETINGS = new Set([
      'Good Morning',
      'Good Afternoon',
      'Good Evening',
      'Good Night',
    ]);

    await runProperty(
      'Every hour in [0,23] maps to exactly one valid greeting',
      fc.property(
        fc.integer({ min: 0, max: 23 }),
        (hour) => {
          const result = getGreeting(hour);
          // Must be one of the four strings
          if (!VALID_GREETINGS.has(result)) return false;
          // Must be exactly one (the function is deterministic — calling again must return same value)
          if (getGreeting(hour) !== result) return false;
          return true;
        }
      )
    );

    await runProperty(
      'Hours 5–11 always return "Good Morning"',
      fc.property(
        fc.integer({ min: 5, max: 11 }),
        (hour) => getGreeting(hour) === 'Good Morning'
      )
    );

    await runProperty(
      'Hours 12–17 always return "Good Afternoon"',
      fc.property(
        fc.integer({ min: 12, max: 17 }),
        (hour) => getGreeting(hour) === 'Good Afternoon'
      )
    );

    await runProperty(
      'Hours 18–20 always return "Good Evening"',
      fc.property(
        fc.integer({ min: 18, max: 20 }),
        (hour) => getGreeting(hour) === 'Good Evening'
      )
    );

    await runProperty(
      'Hours 21–23 always return "Good Night"',
      fc.property(
        fc.integer({ min: 21, max: 23 }),
        (hour) => getGreeting(hour) === 'Good Night'
      )
    );

    await runProperty(
      'Hours 0–4 always return "Good Night"',
      fc.property(
        fc.integer({ min: 0, max: 4 }),
        (hour) => getGreeting(hour) === 'Good Night'
      )
    );

    section('Property 2 — Clock time format round-trip');
    // Feature: todo-list-life-dashboard, Property 2: Clock time format round-trip
    // Validates: Requirements 1.1

    const TIME_PATTERN = /^\d{2}:\d{2}:\d{2}$/;

    await runProperty(
      'formatTime always matches /^\\d{2}:\\d{2}:\\d{2}$/',
      fc.property(
        fc.date(),
        (date) => TIME_PATTERN.test(formatTime(date))
      )
    );

    await runProperty(
      'Parsed hours equal date.getHours()',
      fc.property(
        fc.date(),
        (date) => {
          const parts = formatTime(date).split(':');
          return parseInt(parts[0], 10) === date.getHours();
        }
      )
    );

    await runProperty(
      'Parsed minutes equal date.getMinutes()',
      fc.property(
        fc.date(),
        (date) => {
          const parts = formatTime(date).split(':');
          return parseInt(parts[1], 10) === date.getMinutes();
        }
      )
    );

    await runProperty(
      'Parsed seconds equal date.getSeconds()',
      fc.property(
        fc.date(),
        (date) => {
          const parts = formatTime(date).split(':');
          return parseInt(parts[2], 10) === date.getSeconds();
        }
      )
    );

    await runProperty(
      'Hours part is zero-padded (length === 2)',
      fc.property(
        fc.date(),
        (date) => formatTime(date).split(':')[0].length === 2
      )
    );

    await runProperty(
      'Minutes part is zero-padded (length === 2)',
      fc.property(
        fc.date(),
        (date) => formatTime(date).split(':')[1].length === 2
      )
    );

    await runProperty(
      'Seconds part is zero-padded (length === 2)',
      fc.property(
        fc.date(),
        (date) => formatTime(date).split(':')[2].length === 2
      )
    );

    // ── Summary ──────────────────────────────────────────────────────────────
    const total = passed + failed;
    const cls   = failed === 0 ? 'all-pass' : 'has-fail';
    const icon  = failed === 0 ? '✓' : '✗';
    summary.innerHTML = `
      <div id="summary" class="${cls}">
        ${icon} ${passed} / ${total} tests passed
        ${failed > 0 ? `<br><strong>${failed} test(s) failed — see details above.</strong>` : ''}
      </div>`;

    // Surface result for automated runners
    console.log(`[PBT] ${passed}/${total} passed, ${failed} failed`);
    if (failed > 0) {
      console.error('[PBT] Some property tests FAILED — see output above.');
    }
  </script>
</body>
</html>
